name: CI / Deploy

on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

  deploy-production:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install image tools
        run: sudo apt-get install -y imagemagick webp

      - name: Convert and optimize images
        run: bash scripts/convert-images.sh

      - name: Build for Cloudflare Pages
        run: npm run build:cf
        env:
          NEXT_PUBLIC_AUTH0_DOMAIN: ${{ secrets.NEXT_PUBLIC_AUTH0_DOMAIN }}
          NEXT_PUBLIC_AUTH0_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_AUTH0_CLIENT_ID }}
          NEXT_PUBLIC_SHOPIFY_STORE_DOMAIN: ${{ secrets.NEXT_PUBLIC_SHOPIFY_STORE_DOMAIN }}
          NEXT_PUBLIC_SHOPIFY_STOREFRONT_TOKEN: ${{ secrets.NEXT_PUBLIC_SHOPIFY_STOREFRONT_TOKEN }}
          NEXT_PUBLIC_SHOPIFY_COLLECTION_ID: ${{ secrets.NEXT_PUBLIC_SHOPIFY_COLLECTION_ID }}

      # TODO(d1-migration): the D1 binding in wrangler.toml still has a
      # placeholder database_id (needs `wrangler d1 create good-luck-db`
      # with an authenticated session first). Once real, confirm whether
      # this Pages project's production/preview D1 binding needs to be
      # set via the Cloudflare dashboard's Pages project settings rather
      # than purely through wrangler.toml -- Pages environment-scoped
      # bindings have historically worked differently from plain Workers,
      # and that couldn't be verified without dashboard access here.
      - name: Deploy to Cloudflare Pages (production)
        run: npm run deploy:production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
