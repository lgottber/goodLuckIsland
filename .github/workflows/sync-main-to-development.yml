name: Sync main to development

on:
  pull_request:
    branches: ["main"]
    types: [closed]

permissions:
  contents: read
  pull-requests: write

jobs:
  sync-to-development:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Create sync PR and assign to first developer
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: existingPRs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:main`,
              base: 'development',
            });

            if (existingPRs.length > 0) {
              core.notice(`Sync PR already open: ${existingPRs[0].html_url}`);
              return;
            }

            const mergedPR = context.payload.pull_request;

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `sync: main → development`,
              body: [
                `Automated sync of \`main\` into \`development\` following the merge of #${mergedPR.number}.`,
                ``,
                `**Merged PR:** [${mergedPR.title}](${mergedPR.html_url})`,
              ].join('\n'),
              head: 'main',
              base: 'development',
            });

            const { data: contributors } = await github.rest.repos.listContributors({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 10,
            });

            const assignee = contributors.length > 0 ? contributors[0].login : null;

            if (assignee) {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                assignees: [assignee],
              });
            }

            core.notice(`Created sync PR: ${pr.html_url}${assignee ? ` (assigned to @${assignee})` : ''}`);
