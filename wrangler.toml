name = "good-luck-island"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

[[analytics_engine_datasets]]
binding = "AnalyticsEngineDataset"
dataset = "good_luck_island_events"

# Shared with goodLuckAdmin's good-luck-db (same database_id) -- both apps
# read/write the same D1 database, per the migration plan in that repo's
# wrangler.jsonc. Only `notifications` is queried from this app so far.
[[d1_databases]]
binding = "DB"
database_name = "good-luck-db"
database_id = "b8a212cf-be15-4baa-a2f2-b9c86a3908e0"
