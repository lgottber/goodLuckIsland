name = "good-luck-island"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

[[analytics_engine_datasets]]
binding = "AnalyticsEngineDataset"
dataset = "good_luck_island_events"

# Same "good-luck-db" database as goodLuckAdmin's wrangler.jsonc -- both
# apps share one D1 database (Supabase has been fully retired; see
# src/lib/db.server.ts and src/app/api/**/route.ts, all API routes
# already read/write through this binding). Schema/migrations are NOT
# owned here -- they live in goodLuckAdmin/migrations/ and are applied
# with `wrangler d1 migrations apply good-luck-db --remote` from that
# repo, so no migrations_dir is set on this binding.
#
# This binding only reaches Pages Functions (server-side API routes
# under src/app/api/), not the statically-delivered pages themselves --
# Cloudflare Pages' static output has no server runtime to bind into.
[[d1_databases]]
binding = "DB"
database_name = "good-luck-db"
database_id = "b8a212cf-be15-4baa-a2f2-b9c86a3908e0"

# Rate limiting store. Cloudflare Pages projects don't support the
# [[ratelimits]] binding (Workers-only), so limits are enforced in app
# code via src/lib/rate-limit.server.ts against this KV namespace instead
# -- see src/middleware.ts and src/app/api/{unsubscribe,track}/route.ts.
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "4568eeb8482b4a288b38f87b16baa66c"
